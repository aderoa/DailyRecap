name: Generate NBA Daily Recap
on:
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * *'
    - cron: '0 15 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests

      - name: Run milestones
        run: |
          HOUR=$(TZ=America/New_York date +%H)
          if [ "$HOUR" -ge 8 ] && [ "$HOUR" -le 14 ]; then
            echo "Morning — rotating baseline"
            python milestones.py --rotate
          else
            python milestones.py --date 2026-03-28 || true
            python milestones.py --date 2026-03-29 || echo "Milestone detection failed"
          fi

      - name: Generate recap
        run: python generate_recap.py

      - name: Debug
        run: |
          echo "=== Files ==="
          ls -la *.csv *.html *.txt 2>/dev/null
          echo "=== .gitignore ==="
          cat .gitignore 2>/dev/null || echo "No .gitignore"
          echo "=== git status ==="
          git status

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --force index.html snapshot_live.csv milestones_today.csv processed_games.txt 2>/dev/null || true
          git status
          git commit -m "Daily recap + milestones $(TZ=America/New_York date +%Y-%m-%d)" || echo "Nothing to commit"
          git push || echo "Nothing to push"This
