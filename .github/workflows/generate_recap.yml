name: Generate NBA Daily Recap
on:
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * *'
    - cron: '0 15 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests

      - name: Run milestones
        run: |
          python milestones.py --date 2026-03-27 || true
          python milestones.py --date 2026-03-28 || true
          python milestones.py --date 2026-03-29 || echo "Failed"

      - name: Generate recap
        run: python generate_recap.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --force index.html snapshot_live.csv milestones_today.csv processed_games.txt
          git status
          git commit -m "Daily recap + milestones $(TZ=America/New_York date +%Y-%m-%d)" || echo "Nothing to commit"
          git push || echo "Nothing to push"
