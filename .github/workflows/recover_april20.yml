name: Recover April 20 Milestones

on:
  workflow_dispatch:  # manual trigger only — click "Run workflow" on the Actions tab

jobs:
  recover:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install nba_api requests

      - name: Run recovery
        run: python recovery_april20.py

      - name: Run recap generator
        run: python generate_recap.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --force index.html snapshot.csv snapshot_live.csv milestones_today.csv
          git commit -m "Recover April 20 milestones via NBA Stats API" || echo "Nothing to commit"
          git push || echo "Nothing to push"
