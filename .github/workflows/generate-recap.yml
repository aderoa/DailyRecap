name: Generate NBA Daily Recap
on:
  workflow_dispatch:  # Manual trigger only

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python generate_recap.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily recap"
          file_pattern: nba_daily_recap.html
