name: Generate NBA Daily Recap
on:
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * *'   # 6:30 AM UTC = 1:30 AM ET — milestones + recap
    - cron: '0 16 * * *'   # 4:00 PM UTC = 11:00 AM ET — silent refresh

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests

      - name: Detect milestones
        run: |
          HOUR=$(TZ=America/New_York date +%H)
          if [ "$HOUR" -ge 9 ] && [ "$HOUR" -le 14 ]; then
            echo "Refresh mode — catching missed games"
            python milestones.py --refresh
          else
            echo "Detect mode — finding milestones"
            python milestones.py || echo "Milestone detection failed, continuing"
          fi

      - name: Generate recap
        run: |
          HOUR=$(TZ=America/New_York date +%H)
          if [ "$HOUR" -ge 9 ] && [ "$HOUR" -le 14 ]; then
            echo "Refresh run — skipping recap"
          else
            python generate_recap.py
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html snapshot.csv milestones_today.csv processed_games.txt 2>/dev/null || true
          git diff --cached --quiet && echo "No changes" && exit 0
          DATE=$(TZ=America/New_York date +%Y-%m-%d)
          HOUR=$(TZ=America/New_York date +%H)
          if [ "$HOUR" -ge 9 ] && [ "$HOUR" -le 14 ]; then
            MSG="Refresh snapshot $DATE"
          else
            MSG="Daily recap + milestones $DATE"
          fi
          git commit -m "$MSG"
          git push
